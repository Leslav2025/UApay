<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA GAME</title>
    <style>
        body { background-color: black; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        #game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #score { font-size: 48px; font-weight: bold; color: #ffcc00; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        #league { font-size: 20px; font-weight: bold; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; }
        #click-power { font-size: 16px; color: #aaa; margin-bottom: 25px; }
        
        #wallet-btn { position: absolute; top: 20px; right: 20px; background: #0088cc; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; z-index: 100; border: none; color: white; }

        /* НАЛАШТУВАННЯ ДЛЯ НОВОЇ МОНЕТИ */
        #coin {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            
            /* ТВОЯ НОВА КАРТИНКА ТУТ */
            background-image: url('1774824626028.png'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            
            box-shadow: 0 0 40px rgba(0, 136, 204, 0.4);
        }
        #coin:active { transform: scale(0.95); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: white; text-decoration: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="wallet-btn" onclick="withdraw()">Wallet</div>
    
    <div style="margin-bottom: 15px;">
        <span style="font-size: 18px; color: #888;">Гравець:</span><br>
        <span style="font-size: 22px; font-weight: bold;">Михайло Буряк 🐝</span>
    </div>

    <div id="score">0</div>
    <div id="league">Мідна Ліга</div>
    <div id="click-power">Сила кліку: x1</div>

    <div id="coin" onclick="handleTap(event)"></div>
</div>

<div class="nav-bar">
    <div class="nav-item">Клікер</div>
    <div class="nav-item" onclick="buyBoost()">🚀 Boost</div>
</div>

<script>
    let score = parseInt(localStorage.getItem('score')) || 0;
    let clickValue = parseInt(localStorage.getItem('clickValue')) || 1;
    
    // ТВОЇ НОВІ ДАНІ (ОНОВЛЕНО)
    const botToken = "8607617517:AAFsGmHmlh71Ot8G7JREWXVqWJ1Cm4pxzrc";
    const chatId = "-1001451233135";

    const clickSound = new Audio('Mouse-click-3.mp3');

    function updateDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('click-power').innerText = `Сила кліку: x${clickValue}`;
        
        let league = "Мідна Ліга";
        if (score >= 100000) league = "Золота Ліга";
        else if (score >= 10000) league = "Срібна Ліга";
        document.getElementById('league').innerText = league;
    }

    function handleTap(event) {
        score += clickValue;
        clickSound.currentTime = 0;
        clickSound.play().catch(e => {});
        updateDisplay();
        localStorage.setItem('score', score);
    }

    function buyBoost() {
        if (score >= 1000) {
            score -= 1000;
            clickValue += 5;
            localStorage.setItem('score', score);
            localStorage.setItem('clickValue', clickValue);
            updateDisplay();
            alert("Буст активовано!");
        } else {
            alert("Потрібно 1000 монет");
        }
    }

    function withdraw() {
        if (score < 10000) {
            alert("Мінімалка — 10,000 монет!");
            return;
        }

        const wallet = prompt("Ваш TON гаманець:");
        if (!wallet) return;

        const message = `💰 ЗАЯВКА\n👤 Михайло Буряк 🐝\n💎 Сума: ${score} UA\n💳 Гаманець: ${wallet}`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: message })
        })
        .then(response => {
            if (response.ok) {
                score = 0;
                clickValue = 1;
                localStorage.setItem('score', 0);
                localStorage.setItem('clickValue', 1);
                updateDisplay();
                alert("Успішно надіслано в новий канал!");
            } else {
                alert("Помилка! Перевір права бота в каналі.");
            }
        });
    }

    updateDisplay();
</script>

</body>
</html>
