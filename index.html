<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        #header { width: 90%; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        #score { font-size: 60px; font-weight: bold; margin: 20px 0; }
        
        /* Монета в рамці */
        .coin-wrap { width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 4px solid #333; position: relative; }
        #coin { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.05s; }
        #coin:active { transform: scale(0.96); }
        
        #energy-wrap { width: 80%; margin-top: 30px; }
        #energy-bar { width: 100%; height: 10px; background: #333; border-radius: 10px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: #ffcc00; transition: width 0.1s; }
        
        .plus-one { position: absolute; color: white; font-size: 30px; font-weight: bold; animation: up 0.7s forwards; pointer-events: none; }
        @keyframes up { to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div id="header">
        <div style="font-size:12px;color:#888;text-align:left;">Гравець:<br><b id="user-name">...</b></div>
        <div style="font-size:12px;color:#888;">UA pay v1.3</div>
    </div>

    <div id="score">0</div>

    <div class="coin-wrap">
        <img id="coin" src="1774571977298.png?v=fixed" alt="Coin">
    </div>

    <div id="energy-wrap">
        <div id="energy-bar"><div id="energy-fill"></div></div>
        <div style="margin-top:5px">⚡ <span id="energy-val">1000</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseInt(localStorage.getItem('ua_pay_score')) || 0;
        let energy = 1000;

        document.getElementById('score').innerText = score;
        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Гість";

        document.getElementById('coin').onclick = (e) => {
            if (energy <= 0) {
                // Вібрація помилки, якщо нема енергії
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // ВІБРАЦІЯ при кліку
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium'); 
            }

            score++;
            energy--;
            
            document.getElementById('score').innerText = score;
            localStorage.setItem('ua_pay_score', score);
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
            document.getElementById('energy-val').innerText = energy;

            // Анімація +1
            const p = document.createElement('div');
            p.innerText = '+1'; p.className = 'plus-one';
            p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        };

        // Відновлення енергії
        setInterval(() => { 
            if(energy < 1000) { 
                energy++; 
                document.getElementById('energy-fill').style.width = (energy/10) + '%'; 
                document.getElementById('energy-val').innerText = energy; 
            } 
        }, 1500);
    </script>
</body>
</html>
