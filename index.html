<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body{background:#000;color:#fff;text-align:center;font-family:sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden;user-select:none}
        #header{width:90%;display:flex;justify-content:space-between;padding:15px 0}
        #wallet-btn{background:#0088cc;border:none;padding:8px 15px;border-radius:20px;color:#fff;font-weight:700;cursor:pointer}
        #score{font-size:60px;font-weight:700;margin:10px 0;color:#fc0}
        #league{font-size:20px;font-weight:700;color:#fc0;text-transform:uppercase;margin-bottom:5px}
        .coin-wrap{width:280px;height:280px;border-radius:50%;overflow:hidden;border:4px solid #333;transition:transform .05s;margin-top:10px}
        #coin{width:100%;height:100%;object-fit:cover}
        .coin-active{transform:scale(.95)}
        #energy-bar{width:80%;height:10px;background:#333;border-radius:10px;margin-top:20px;overflow:hidden}
        #energy-fill{width:100%;height:100%;background:#fc0}
        #nav{position:absolute;bottom:20px;width:90%;background:#111;display:flex;justify-content:space-around;padding:15px 0;border-radius:20px}
        #w-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;padding:25px;border-radius:25px;border:2px solid #0088cc;width:85%;z-index:2000}
        #w-modal input{width:100%;padding:12px;margin:15px 0;border-radius:10px;border:1px solid #333;background:#000;color:#fff;box-sizing:border-box}
        .m-btn{background:#0088cc;border:none;padding:12px;border-radius:10px;color:#fff;font-weight:700;width:100%}
        #ovl{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1999}
    </style>
</head>
<body>
    <audio id="click-sound" src="Mouse-click-3.mp3" preload="auto"></audio>
    <div id="header">
        <div>Гравець:<br><b id="u-name">...</b></div>
        <button id="wallet-btn" onclick="openW()">Wallet</button>
    </div>
    <div id="score">0</div>
    <div id="league">Мідна ліга</div>
    <div style="color:#888;font-size:14px;margin-bottom:10px">Сила кліку: x<span id="mult-val">5</span></div>
    <div class="coin-wrap" id="c-w"><img id="coin" src="1774571977298.png"></div>
    <div id="energy-bar"><div id="energy-fill"></div></div>
    <div id="nav">
        <div style="color:#fff">Клікер</div>
        <div onclick="buyB()" style="color:#888;cursor:pointer">🚀 Boost</div>
    </div>
    <div id="ovl" onclick="closeM()"></div>
    <div id="w-modal">
        <h3>Вивід UA pay</h3>
        <input type="text" id="addr" placeholder="TON гаманець">
        <button class="m-btn" onclick="sendW()">Відправити</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let s = parseInt(localStorage.getItem('ua_s')) || 0;
        let m = parseInt(localStorage.getItem('ua_m')) || 5; 
        let e = 1000;
        const bT = "8607617517:AAFsGmHmlh71Ot8G7JREWXVqWJ1Cm4pxzrc";
        const cI = "-1001451233135";
        const snd = document.getElementById('click-sound');
        function up() {
            document.getElementById('score').innerText = s;
            document.getElementById('u-name').innerText = tg.initDataUnsafe?.user?.first_name || "Гість";
            document.getElementById('mult-val').innerText = m;
            let l = "Мідна ліга";
            if(s >= 5000) l = "Бронзова ліга";
            if(s >= 10000) l = "Срібна ліга";
            if(s >= 50000) l = "Золота ліга";
            document.getElementById('league').innerText = l;
        }
        up();
        document.getElementById('coin').onclick = () => {
            if (e < m) return;
            snd.currentTime = 0;
            snd.play().catch(() => {}); 
            const c = document.getElementById('c-w');
            c.classList.add('coin-active');
            setTimeout(() => c.classList.remove('coin-active'), 50);
            s += m; e -= m;
            localStorage.setItem('ua_s', s);
            up();
            document.getElementById('energy-fill').style.width = (e / 10) + '%';
        };
        function buyB() {
            let cost = 500 * (m - 4);
            if (s >= cost) {
                s -= cost; m++;
                localStorage.setItem('ua_s', s);
                localStorage.setItem('ua_m', m);
                up();
            } else { tg.showAlert('Мало монет! Треба ' + cost); }
        }
        function openW() { document.getElementById('w-modal').style.display = 'block'; document.getElementById('ovl').style.display = 'block'; }
        function closeM() { document.getElementById('w-modal').style.display = 'none'; document.getElementById('ovl').style.display = 'none'; }
        
        // Функція виводу з ОБНУЛЕННЯМ РАХУНКУ
        function sendW() {
            const a = document.getElementById('addr').value;
            if (s < 10000) { tg.showAlert("Мінімалка 10к!"); }
            else {
                fetch(`https://api.telegram.org/bot${bT}/sendMessage?chat_id=${cI}&text=Вивід: ${s} від ${tg.initDataUnsafe?.user?.first_name} на ${a}`)
                .then(() => { 
                    tg.showAlert("Заявка в каналі!"); 
                    // Скидаємо баланс після успіху
                    s = 0;
                    localStorage.setItem('ua_s', 0);
                    up();
                    closeM(); 
                });
            }
        }
        setInterval(() => { if (e < 1000) { e = Math.min(1000, e + 2); document.getElementById('energy-fill').style.width = (e / 10) + '%'; } }, 1000);
    </script>
</body>
</html>
