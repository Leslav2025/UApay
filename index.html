
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UA pay</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; margin-top: 50px; }
        img { width: 200px; cursor: pointer; border-radius: 50%; }
        h1 { font-size: 50px; }
    </style>
</head>
<body>
    <h1 id="score">0</h1>
    <img id="coin" src="1774571977298.png" alt="Coin">

    <script>
        let s = 0;
        document.getElementById('coin').onclick = () => {
            s++;
            document.getElementById('score').innerText = s;
        };
    </script>
</body>
</html>
